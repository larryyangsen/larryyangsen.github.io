<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        .out {
            height: 600px;
            width: 600px;
            top: 100px;
            left: 100px;
            position: relative;
            background-color: #cf1234;
        }

        .box {
            height: 100px;
            width: 100px;
            position: absolute;
            background-color: #fff;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div class="out">
        <div class="box"></div>
    </div>
</body>

</html>
